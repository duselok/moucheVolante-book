<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mouche Volante - Book</title>
  <link rel="preload" as="image" href="bg-book-pov.png?v=book-image-1">
  <link rel="stylesheet" href="style.css?v=book-image-2">
</head>
<body class="is-loading">
  <div id="bg"></div>
  <div id="sun-glare"></div>
  <canvas id="scene"></canvas>
  <script src="p5.min.js"></script>
  <script src="legacy-elements.js"></script>
  <script src="schlieren.js"></script>
  <script>
    const bgReady = new Promise((resolve) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = "bg-book-pov.png?v=book-image-1";
    });
    Promise.all([bgReady, new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)))])
      .then(() => document.body.classList.remove("is-loading"));
  </script>
</body>
</html>
